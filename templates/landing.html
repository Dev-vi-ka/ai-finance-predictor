<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Finance Predictor - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .landing-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            max-width: 600px;
            width: 90%;
        }

        .landing-container h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .landing-container p {
            font-size: 1.2rem;
            margin-bottom: 50px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-container .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            min-width: 180px;
        }

        .btn-login {
            background-color: white;
            color: #667eea;
            border: none;
        }

        .btn-login:hover {
            background-color: #f0f0f0;
            color: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-register {
            background-color: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-register:hover {
            background-color: white;
            color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .features {
            margin-top: 60px;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.95rem;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            .landing-container h1 {
                font-size: 2rem;
            }

            .landing-container p {
                font-size: 1rem;
            }

            .btn-container {
                flex-direction: column;
            }

            .btn-container .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <h1>Spendora</h1>
        <p>Smarter Budgeting. Predictive Spending. Complete Control.</p>

        <div class="btn-container">
            <a href="{{ url_for('auth.login') }}" class="btn btn-login">Login</a>
            <a href="{{ url_for('auth.register') }}" class="btn btn-register">Sign Up</a>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div>Smart expense tracking and categorization</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔮</div>
                <div>AI-powered spending predictions</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔄</div>
                <div>Track recurring transactions</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📈</div>
                <div>Detailed analytics and insights</div>
            </div>
        </div>
    </div>
</body>
</html>
