{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h3>Transaction History</h3>

    <a href="{{ url_for('transaction.add_transaction_route') }}" class="btn btn-success">
       Add New
    </a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th></th>
            </tr>
        </thead>

        <tbody>
        {% for txn in transactions %}
            <tr>
                <td>{{ txn['date'] }}</td>
                <td>{{ txn['description'] }}</td>
                <td>{{ txn['category'] }}</td>

                <td class="{% if txn['amount'] < 0 %}text-danger{% else %}text-success{% endif %}">
                    ₹ {{ txn['amount'] }}
                </td>

                <td>
                    <a href="{{ url_for('transaction.delete', txn_id=txn['id']) }}" 
                       class="btn btn-sm btn-danger">
                       Delete
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>
{% endblock %}
