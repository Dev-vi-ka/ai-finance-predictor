<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendora - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.0.0/flowbite.min.css" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#a01ba2',
                        'primary-dark': '#c41682',
                        accent: '#ff6b9d',
                        gold: '#ffd700',
                    }
                }
            }
        }
    </script>
    <style>
        .neon-border {
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2), inset 0 0 30px rgba(255, 255, 255, 0.1);
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: white;
            border-radius: 50%;
            opacity: 0.6;
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
            box-shadow: 0 0 0 1000px transparent inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="min-h-screen bg-gradient-to-b from-primary via-primary-dark to-accent flex flex-col items-center justify-center px-4 relative">
        <!-- Starfield background -->
        <div id="starfield" class="absolute inset-0"></div>

        <!-- Mountains -->
        <div class="absolute bottom-0 left-0 right-0 h-64 md:h-48 sm:h-32 overflow-hidden">
            <img src="{{ url_for('static', filename='images/mountains.png') }}" alt="Mountain Background" class="w-full h-full object-cover object-center">
        </div>

        <!-- Login Card -->
        <div class="relative z-10 w-full max-w-md">
            <div class="neon-border bg-white bg-opacity-10 backdrop-blur-lg rounded-3xl px-8 py-12 md:px-6 md:py-10">
                
                <!-- Logo Section -->
                <div class="flex flex-col items-center mb-10">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Spendora Logo" class="h-16 w-auto mb-4">
                    <h1 class="text-4xl font-light tracking-widest text-white drop-shadow-lg">LOGIN</h1>
                </div>

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="flash-message mb-6 p-4 rounded-lg bg-{{ 'red' if category == 'error' else 'green' }}-500 bg-opacity-20 border border-{{ 'red' if category == 'error' else 'green' }}-400 text-white text-sm transition-opacity duration-500">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Login Form -->
                <form method="POST" class="space-y-6">
                    <!-- Email Input -->
                    <div>
                        <input 
                            type="email" 
                            name="email" 
                            placeholder="enter your email id" 
                            class="w-full bg-transparent border-b-2 rounded-lg border-white/50 text-white placeholder-white/60 px-4 py-3 focus:outline-none focus:border-white rounded-lg hover:border-white transition-all duration-300"
                            required>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <input 
                            type="password" 
                            name="password" 
                            placeholder="enter your password" 
                            class="w-full bg-transparent border-b-2 rounded-lg border-white/50 text-white placeholder-white/60 px-4 py-3 focus:outline-none focus:border-white rounded-lg hover:border-white transition-all duration-300"
                            required>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-6 rounded-xl transition-all hover:shadow-lg hover:shadow-primary/50 mt-8">
                        Login
                    </button>
                </form>

                <!-- Create Account Link -->
                <p class="text-center mt-8 text-white text-opacity-90">
                    new user? 
                    <a href="{{ url_for('auth.register') }}" class="text-gold hover:text-yellow-300 font-semibold transition-colors underline">Create Account</a>
                </p>

                <!-- Forgot Password Link -->
                <p class="text-center mt-4 text-white text-opacity-70">
                    <a href="{{ url_for('auth.reset_password_request') if 'auth.reset_password_request' in config else '#' }}" class="text-white text-opacity-70 hover:text-opacity-100 transition-colors underline text-sm">Forgot password?</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.0.0/flowbite.min.js"></script>
    <script>
        // Create starfield effect
        function createStars() {
            const starfield = document.getElementById('starfield');
            for (let i = 0; i < 40; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 70 + '%';
                star.style.opacity = Math.random() * 0.6 + 0.2;
                starfield.appendChild(star);
            }
        }
        createStars();

        // Auto-Dismiss Flash Messages
        document.addEventListener("DOMContentLoaded", function () {
            const flashes = document.querySelectorAll('.flash-message');
            flashes.forEach(flash => {
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 500); // Wait for transition to finish
                }, 5000); // 5 seconds
            });
        });
    </script>
</body>
</html>
